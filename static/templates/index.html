<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>lueyo Short Links</title>
    <link rel="icon" href="static/lueyo.png">
    <link rel="stylesheet" href="static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <h1>Crear Enlace</h1>
        <p class="subtitle">Pon la URL que quieras acortar</p>
        <form action="/s/" method="post">
            <div class="input-group">
                <label for="url">URL</label>
                <input type="text" id="url" name="url" placeholder="https://..." required>
            </div>
            <div class="input-group">
                <label for="password">Contraseña (opcional)</label>
                <input type="password" id="password" name="password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary">Crear Enlace</button>
        </form>
    </div>
    <script src="static/script.js"></script>
</body>
</html>
