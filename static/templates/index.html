<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>lueyo Short Links</title>
    <link rel="icon" href="static/lueyo.png">
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <div class="card">
        <img src="static/lueyo.png" alt="Logo" class="logo">
        <h1>Crear Enlace Corto</h1>
        <p class="subtitle">Ingresa una URL para acortarla</p>
        <form action="/s/" method="post">
            <div class="input-group">
                <label for="url">URL</label>
                <input type="text" id="url" name="url" placeholder="https://ejemplo.com" required>
            </div>
            <div class="input-group">
                <label for="password">Contraseña (opcional)</label>
                <input type="password" id="password" name="password" placeholder="Protege tu enlace">
            </div>
            <button type="submit" class="btn btn-primary">Crear Enlace</button>
        </form>
    </div>
    <script src="static/script.js"></script>
</body>
</html>
