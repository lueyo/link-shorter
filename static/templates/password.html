<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlace Protegido</title>
    <link rel="icon" href="static/lueyo.png">
    <link rel="stylesheet" href="static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <h1>Enlace Protegido</h1>
        <p class="subtitle">Ingresa la contraseña para acceder</p>
        <form id="passwordForm">
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Acceder</button>
            <p class="error-msg" id="errorMsg">Contraseña incorrecta</p>
        </form>
        <span class="link-text"><a href="/">Volver al inicio</a></span>
    </div>
    <script>
        const pathParts = window.location.pathname.split('/');
        const shortCode = pathParts[pathParts.length - 1];

        document.getElementById('passwordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;

            fetch(`/s/${shortCode}/verify?password=${encodeURIComponent(password)}`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.valid) {
                    window.location.href = data.url;
                } else {
                    document.getElementById('errorMsg').classList.add('visible');
                    document.getElementById('password').value = '';
                }
            })
            .catch(err => {
                console.error('Error:', err);
                document.getElementById('errorMsg').classList.add('visible');
            });
        });
    </script>
</body>
</html>
